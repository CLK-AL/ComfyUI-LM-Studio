[pytest]
# KMP-style layout: Python sources under src/pyMain/py/, tests under
# src/pyTest/py/. `pythonpath` exposes the main source tree so
# `from al.clk.api.X import …` resolves without installing the
# package. `testpaths` narrows discovery to the pyTest tree.
pythonpath = src/pyMain/py
testpaths = src/pyTest/py
python_files = test_*.py
norecursedirs = __pycache__ .git example_workflow node_modules
# The repo root ships an `__init__.py` for ComfyUI custom-node
# discovery; its relative imports break pytest's default rootdir
# walk. `importlib` import mode imports test modules by path.
addopts = --import-mode=importlib --ignore=__init__.py --confcutdir=src/pyTest
markers =
    slow: tests that take noticeably longer (simulated timeouts, etc.)
