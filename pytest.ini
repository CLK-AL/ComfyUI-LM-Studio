[pytest]
testpaths = tests
python_files = test_*.py
norecursedirs = __pycache__ .git example_workflow
# The repo root ships an __init__.py for ComfyUI custom-node discovery;
# its relative imports break pytest's default rootdir/package walk. The
# `importlib` import mode imports test modules by path and skips that.
addopts = --import-mode=importlib --ignore=__init__.py --confcutdir=tests
