// ComfyUI dynamic-UI flags carried in the widget options dict.
enum ComfyOption {
  CO_UNSPECIFIED       = 0;
  CO_FORCE_INPUT       = 1;  // forceInput
  CO_DEFAULT_INPUT     = 2;  // defaultInput
  CO_LAZY              = 3;  // lazy
  CO_DYNAMIC_PROMPTS   = 4;  // dynamicPrompts
  CO_MULTILINE         = 5;  // multiline
  CO_IMAGE_UPLOAD      = 6;  // image_upload
  CO_IMAGE_FOLDER      = 7;  // image_folder
  CO_DIRECTORY         = 8;  // directory
  CO_TOOLTIP_MARKDOWN  = 9;  // tooltip_md
}

// `display` widget option for INT / FLOAT widgets in ComfyUI.
enum ComfyDisplay {
  CD_UNSPECIFIED = 0;
  CD_NUMBER      = 1;
  CD_SLIDER      = 2;
  CD_KNOB        = 3;
  CD_COLOR       = 4;
}

// ----- mapping message --------------------------------------------------
message FormatMapping {
  JsonType      json_type   = 1;
  JsonFormat    json_format = 2;
  SqlType       sql_type    = 3;
  string        kclass      = 4;    // Kotlin KClass FQN
  ComposeWidget composable  = 5;
  HtmlInputType html_input  = 6;
  ComfyType     comfy       = 7;
  string        placeholder = 8;
}

message FormatRow {
  string        name    = 1;   // "EMAIL", "DATE", "INT64", …
  FormatMapping mapping = 2;
}

// The entire FormatType catalog — the wire representation of the
// same enum we maintain in Python (format_type.py) and Kotlin
// (api/common/FormatType.kt). Used as both a round-trip contract
// and the parity source.
message FormatCatalog {
  repeated FormatRow rows = 1;
}
