}

// Numeric values mirror java.sql.Types exactly. Negative values
// cannot be enum members in proto3, so we carry the mapping as a
// string name and let the language-side helper translate.
enum SqlType {
  ST_UNSPECIFIED              = 0;
  ST_BIT                      = 1;  // java.sql.Types.BIT  = -7
  ST_TINYINT                  = 2;  // -6
  ST_SMALLINT                 = 3;  //  5
  ST_INTEGER                  = 4;  //  4
  ST_BIGINT                   = 5;  // -5
  ST_FLOAT                    = 6;
  ST_REAL                     = 7;
  ST_DOUBLE                   = 8;
  ST_NUMERIC                  = 9;
  ST_DECIMAL                  = 10;
  ST_CHAR                     = 11;
  ST_VARCHAR                  = 12;
  ST_LONGVARCHAR              = 13;
  ST_DATE                     = 14;
  ST_TIME                     = 15;
  ST_TIMESTAMP                = 16;
  ST_TIMESTAMP_WITH_TIMEZONE  = 17;
  ST_TIME_WITH_TIMEZONE       = 18;
  ST_BINARY                   = 19;
  ST_VARBINARY                = 20;
  ST_LONGVARBINARY            = 21;
  ST_NULL                     = 22;
  ST_OTHER                    = 23;
  ST_JAVA_OBJECT              = 24;
  ST_BLOB                     = 25;
  ST_CLOB                     = 26;
  ST_NCHAR                    = 27;
  ST_NVARCHAR                 = 28;
  ST_LONGNVARCHAR             = 29;
  ST_NCLOB                    = 30;
  ST_BOOLEAN                  = 31;
  ST_ROWID                    = 32;
  ST_SQLXML                   = 33;
  ST_REF_CURSOR               = 34;
  ST_ARRAY                    = 35;
  ST_STRUCT                   = 36;
  ST_REF                      = 37;
  ST_DATALINK                 = 38;
}

