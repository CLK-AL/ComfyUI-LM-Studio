openapi: 3.0.3
info:
  title: LM Studio REST API (offline stub for tests)
  version: "0.1.0"
  description: >
    Minimal stub of the LM Studio native API used by ComfyUI-LM-Studio's
    _get_response_api path. Replace with the upstream spec via --spec when
    online access is available.
servers:
  - url: http://127.0.0.1:1234
paths:
  /api/v0/chat/completions:
    post:
      operationId: chatCompletions
      summary: Create a chat completion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [model, messages]
              properties:
                model:       { type: string }
                temperature: { type: number }
                max_tokens:  { type: integer }
                stream:      { type: boolean }
                messages:
                  type: array
                  items:
                    type: object
                    required: [role, content]
                    properties:
                      role:    { type: string, enum: [system, user, assistant] }
                      content: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              example:
                choices:
                  - message:
                      role: assistant
                      content: "stubbed reply from wiremock-lms"
                usage:
                  prompt_tokens: 4
                  completion_tokens: 6
                stats:
                  tokens_per_second: 10.0
  /api/v0/models:
    get:
      operationId: listModels
      summary: List locally loaded models
      responses:
        "200":
          description: OK
          content:
            application/json:
              example:
                data:
                  - id: "stub-model"
                    object: "model"
