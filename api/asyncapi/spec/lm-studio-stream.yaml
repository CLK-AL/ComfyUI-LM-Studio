asyncapi: "2.6.0"
info:
  title: LM Studio — streaming chat completions (AsyncAPI projection)
  version: "0.1.0"
  description: >
    AsyncAPI view of LM Studio's streaming endpoint. Same shape as the
    OpenAPI `chatCompletions` operation, but modelled as an async
    publish/subscribe pair: the client *publishes* a request, then
    *subscribes* to a stream of SSE-style `chat.completion.chunk`
    events until the server emits `[DONE]`.

servers:
  local:
    url:      http://127.0.0.1:1234
    protocol: sse          # LM Studio streams via text/event-stream

defaultContentType: application/json

channels:
  chat.completions.stream:
    description: Streaming chat-completions channel.
    publish:
      operationId: startChatCompletionStream
      message:
        $ref: '#/components/messages/ChatRequest'
    subscribe:
      operationId: onChatCompletionChunk
      message:
        $ref: '#/components/messages/ChatChunk'

components:
  messages:
    ChatRequest:
      name: ChatRequest
      contentType: application/json
      payload:
        type: object
        required: [model, messages]
        properties:
          model:       { type: string }
          messages:
            type: array
            items:
              type: object
              required: [role, content]
              properties:
                role:    { type: string, enum: [system, user, assistant] }
                content: { type: string }
          temperature: { type: number, minimum: 0, maximum: 2 }
          max_tokens:  { type: integer, minimum: 1 }
          stream:      { type: boolean, default: true }

    ChatChunk:
      name: ChatChunk
      contentType: text/event-stream
      payload:
        type: object
        properties:
          id:      { type: string }
          object:  { type: string, enum: [chat.completion.chunk] }
          choices:
            type: array
            items:
              type: object
              properties:
                delta:
                  type: object
                  properties:
                    role:    { type: string }
                    content: { type: string }
                finish_reason: { type: string, nullable: true }
